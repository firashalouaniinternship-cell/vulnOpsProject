name: DevSecOps Security Scan

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

jobs:
  security-scan:
    name: Security Analysis (SAST & SCA)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies for Reporting
        run: pip install requests

      - name: Run SAST (Semgrep)
        uses: returntocorp/semgrep-action@v1
        with:
          config: auto
          generateSarif: "0" # We want JSON
        continue-on-error: true # Don't block the pipeline if findings are found
      
      # Semgrep action typically outputs to semgrep.json by default in some versions
      # but let's assume it runs and we can capture output or use a specific run step
      - name: Run Semgrep (manual if action output is tricky)
        run: |
          python3 -m pip install semgrep
          semgrep scan --json --config=auto --output=semgrep-report.json
        continue-on-error: true

      - name: Run SCA (npm audit)
        run: |
          if [ -f package.json ]; then
            npm install --package-lock-only || true
            npm audit --json > sca-report.json || true
          else
            echo "{ \"vulnerabilities\": {} }" > sca-report.json
          fi
        continue-on-error: true

      - name: Send results to DevSecOps Platform
        env:
          API_TOKEN: ${{ secrets.API_TOKEN }}
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 - <<EOF
          import json, os, requests
          
          def load_json(path):
              if os.path.exists(path):
                  try:
                      with open(path) as f:
                          return json.load(f)
                  except:
                      return {}
              return {}

          sast_data = load_json('semgrep-report.json')
          sca_data = load_json('sca-report.json')

          payload = {
              "repo_full_name": os.environ.get('GITHUB_REPOSITORY'),
              "repo_owner": os.environ.get('GITHUB_REPOSITORY_OWNER'),
              "repo_name": os.environ.get('GITHUB_REPOSITORY').split('/')[-1],
              "branch": os.environ.get('GITHUB_REF_NAME'),
              "commit_sha": os.environ.get('GITHUB_SHA'),
              "reports": {}
          }
          
          if sast_data:
              payload["reports"]["sast"] = {"scanner": "semgrep", "data": sast_data}
          if sca_data and sca_data.get('vulnerabilities'):
              payload["reports"]["sca"] = {"scanner": "npm-audit", "data": sca_data}

          backend_url = os.environ.get('BACKEND_URL', '').rstrip('/')
          if not backend_url:
              print("Error: BACKEND_URL secret is not set")
              exit(1)
              
          url = f"{backend_url}/api/scans/github/"
          headers = {
              "Content-Type": "application/json",
              "Authorization": f"Bearer {os.environ.get('API_TOKEN')}"
          }

          print(f"Sending results to {url}...")
          try:
              response = requests.post(url, json=payload, headers=headers, timeout=60)
              print(f"Status Code: {response.status_code}")
              print(f"Response: {response.text}")
              if response.status_code >= 400:
                  exit(1)
          except Exception as e:
              print(f"Error sending request: {e}")
              exit(1)
          EOF
