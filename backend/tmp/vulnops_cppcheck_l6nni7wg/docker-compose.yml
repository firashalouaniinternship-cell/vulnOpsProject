version: '3.8'

# ── Réseau interne partagé ──────────────────────────────────────────
networks:
  devsecops-network:
    driver: bridge

# ── Volumes persistants ─────────────────────────────────────────────
volumes:
  postgres_data:
  sonarqube_data:
  sonarqube_logs:
  sonarqube_extensions:
  defectdojo_data:
  ai_models:

# ── Services ────────────────────────────────────────────────────────
services:

  # ════════════════════════════════════════════════
  # Base de données PostgreSQL
  # ════════════════════════════════════════════════
  postgres:
    image: postgres:15-alpine
    container_name: devsecops-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_MULTIPLE_DATABASES: devsecops,sonarqube,defectdojo
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    networks:
      - devsecops-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ════════════════════════════════════════════════
  # SonarQube — Analyse SAST
  # ════════════════════════════════════════════════
  sonarqube:
    image: sonarqube:10-community
    container_name: devsecops-sonarqube
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://postgres:5432/sonarqube
      SONAR_JDBC_USERNAME: ${POSTGRES_USER}
      SONAR_JDBC_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "9000:9000"
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_logs:/opt/sonarqube/logs
      - sonarqube_extensions:/opt/sonarqube/extensions
    networks:
      - devsecops-network
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/api/system/status"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s

  # ════════════════════════════════════════════════
  # DefectDojo — Centralisation vulnérabilités
  # ════════════════════════════════════════════════
  defectdojo:
    image: defectdojo/defectdojo-django:latest
    container_name: devsecops-defectdojo
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DD_DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/defectdojo
      DD_SECRET_KEY: ${SECRET_KEY}
      DD_ALLOWED_HOSTS: "*"
      DD_ADMIN_USER: ${DEFECTDOJO_ADMIN_USER}
      DD_ADMIN_PASSWORD: ${DEFECTDOJO_ADMIN_PASSWORD}
    ports:
      - "8080:8080"
    volumes:
      - defectdojo_data:/app/media
    networks:
      - devsecops-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/api/v2/users/')"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s

  # ════════════════════════════════════════════════
  # Module IA — Scoring des vulnérabilités
  # ════════════════════════════════════════════════
  ai-module:
    build:
      context: ./ai-module
      dockerfile: Dockerfile
    container_name: devsecops-ai
    restart: unless-stopped
    ports:
      - "8001:8001"
    volumes:
      - ai_models:/app/models   # Persiste le modèle entraîné
    networks:
      - devsecops-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 20s
      timeout: 5s
      retries: 5

  # ════════════════════════════════════════════════
  # Backend FastAPI — API principale
  # ════════════════════════════════════════════════
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: devsecops-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      ai-module:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      SECRET_KEY: ${SECRET_KEY}
      AI_MODULE_URL: http://ai-module:8001
      DEFECTDOJO_URL: http://defectdojo:8080
      DEFECTDOJO_TOKEN: ${DEFECTDOJO_TOKEN}
      DEBUG: ${DEBUG}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app          # Hot reload en développement
    networks:
      - devsecops-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ════════════════════════════════════════════════
  # Frontend React — Interface utilisateur
  # ════════════════════════════════════════════════
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: ${REACT_APP_API_URL}
    container_name: devsecops-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - devsecops-network

  # ════════════════════════════════════════════════
  # Nginx — Reverse Proxy (portail unique)
  # ════════════════════════════════════════════════
  nginx:
    image: nginx:alpine
    container_name: devsecops-nginx
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
      - ai-module
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - devsecops-network